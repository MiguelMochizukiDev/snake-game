name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts from build workflow
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Validate artifacts
        run: |
          echo "Artifacts found:"
          if [ ! -d artifacts ] || [ -z "$(find artifacts -type f -print -quit)" ]; then
            echo "No artifacts were downloaded. Ensure build artifacts exist for this release/tag."
            exit 1
          fi
          find artifacts -type f -exec ls -lh {} \;

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: false
